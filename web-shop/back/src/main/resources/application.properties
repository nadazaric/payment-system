#If there is no .env file in the resources directory, comment out the line below
spring.config.import=optional:classpath:.env[.properties]
spring.application.name=back
server.port=${SERVER_PORT}

#Errors
#server.error.include-message=always

#JWT
jwt.secret=${JWT_SECRET_KEY}

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.database=postgresql
#Update
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.defer-datasource-initialization=false
#spring.sql.init.mode=never
#Drop and fill
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# PSP Info
app.psp.base-url=${PSP_BASE_URL}
app.psp.merchant-id=${PSP_MERCHANT_ID}
app.psp.merchant-password=${PSP_MERCHANT_PASSWORD}
app.psp.seller-reference=${PSP_SELLER_REFERENCE}
app.psp.currency=${PSP_CURRENCY}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
app.rabbitmq.payment-notifications.exchange=${RABBITMQ_PAYMENT_NOTIFICATIONS_EXCHANGE}
app.rabbitmq.payment-notifications.queue=${RABBITMQ_PAYMENT_NOTIFICATIONS_QUEUE}
app.rabbitmq.payment-notifications.routing-key=${RABBITMQ_PAYMENT_NOTIFICATIONS_ROUTING_KEY}

# Other
app.images.folder=${IMAGES_FOLDER_PATH}