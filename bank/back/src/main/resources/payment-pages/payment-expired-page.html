<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Payment Expired</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
            text-align: center;
        }

        .icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fee2e2;
            color: #991b1b;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 28px;
            font-weight: 800;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 26px;
            color: #111827;
        }

        p {
            margin: 0;
            color: #6b7280;
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
<main class="card">
    <div class="icon">!</div>

    <h1>Payment link expired</h1>

    <p>
        This payment session is no longer valid. Please return to the web shop and start a new payment.
    </p>
</main>
</body>
</html>
