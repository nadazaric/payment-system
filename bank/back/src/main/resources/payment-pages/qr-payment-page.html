<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>QR Payment</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: #dcfce7;
            color: #166534;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .amount {
            font-size: 22px;
            font-weight: 800;
            color: #111827;
            text-align: right;
            white-space: nowrap;
        }

        .qr-frame {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            background: #ffffff;
        }

        .qr-image {
            width: 280px;
            height: 280px;
            object-fit: contain;
        }

        .note {
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
            line-height: 1.45;
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
                border-radius: 0;
                min-height: 100vh;
                box-shadow: none;
            }

            .top-row {
                align-items: flex-start;
                flex-direction: column;
            }

            .amount {
                text-align: left;
            }

            .qr-image {
                width: 240px;
                height: 240px;
            }
        }
    </style>
</head>

<body>
<main class="card">
    <div class="top-row">
        <div class="badge">QR PAYMENT</div>
        <div class="amount">{{amount}} {{currency}}</div>
    </div>

    <div class="qr-frame" aria-label="QR code frame">
        <img
                class="qr-image"
                src="data:image/png;base64,{{qrImageBase64}}"
                alt="QR code for payment">
    </div>

    <div class="note">
        Scan this QR code using the mock mBanking scanner page.
    </div>
</main>
</body>
</html>
