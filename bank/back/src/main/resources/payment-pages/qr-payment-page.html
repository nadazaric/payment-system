<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>QR Payment</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: #dcfce7;
            color: #166534;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .amount {
            font-size: 22px;
            font-weight: 800;
            color: #111827;
            text-align: right;
            white-space: nowrap;
        }

        .qr-frame {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            background: #ffffff;
        }

        .qr-image {
            width: 280px;
            height: 280px;
            object-fit: contain;
        }

        .status {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            background: #f9fafb;
            color: #6b7280;
            font-size: 13px;
            line-height: 1.45;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
                border-radius: 0;
                min-height: 100vh;
                box-shadow: none;
            }

            .top-row {
                align-items: flex-start;
                flex-direction: column;
            }

            .amount {
                text-align: left;
            }

            .qr-image {
                width: 240px;
                height: 240px;
            }
        }
    </style>
</head>

<body>
<main class="card">
    <div class="top-row">
        <div class="badge">QR PAYMENT</div>
        <div class="amount">{{amount}} {{currency}}</div>
    </div>

    <div class="qr-frame" aria-label="QR code frame">
        <img
                class="qr-image"
                src="data:image/png;base64,{{qrImageBase64}}"
                alt="QR code for payment">
    </div>

    <div id="status"
         class="status">
        Scan this QR code using the mock mBanking scanner page. Waiting for payment confirmation...
    </div>
</main>

<script>
    const statusBox = document.getElementById("status");

    const POLLING_INTERVAL_MS = 2000;

    let pollingIntervalId = null;
    let redirecting = false;

    document.addEventListener("DOMContentLoaded", startPaymentStatusPolling);

    function startPaymentStatusPolling() {
        checkPaymentStatus();

        pollingIntervalId = setInterval(
            checkPaymentStatus,
            POLLING_INTERVAL_MS
        );
    }

    async function checkPaymentStatus() {
        if (redirecting) {
            return;
        }

        const paymentId = getPaymentIdFromUrl();

        if (!paymentId) {
            stopPolling();
            showError("Payment ID could not be resolved from the current URL.");
            return;
        }

        try {
            const response = await fetch(`/api/bank/qr/payments/${paymentId}/status`, {
                method: "GET",
                headers: {
                    "Accept": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("Payment status could not be checked.");
            }

            const data = await response.json();

            handlePaymentStatus(data);
        } catch (error) {
            showInfo("Waiting for payment confirmation...");
        }
    }

    function handlePaymentStatus(data) {
        if (!data || !data.status) {
            showInfo("Waiting for payment confirmation...");
            return;
        }

        if (data.status === "CREATED") {
            showInfo(data.message || "Waiting for payment confirmation...");
            return;
        }

        if (data.redirectUrl) {
            redirecting = true;
            stopPolling();

            if (data.status === "SUCCESS") {
                showSuccess(data.message || "Payment completed successfully. Redirecting...");
            } else {
                showError(data.message || "Payment finished. Redirecting...");
            }

            window.location.href = data.redirectUrl;
            return;
        }

        showError(data.message || "Payment status could not be processed.");
    }

    function getPaymentIdFromUrl() {
        const parts = window.location.pathname
            .split("/")
            .filter(Boolean);

        return parts.length === 0 ? null : parts[parts.length - 1];
    }

    function stopPolling() {
        if (pollingIntervalId) {
            clearInterval(pollingIntervalId);
            pollingIntervalId = null;
        }
    }

    function showInfo(message) {
        statusBox.className = "status";
        statusBox.textContent = message;
    }

    function showSuccess(message) {
        statusBox.className = "status success";
        statusBox.textContent = message;
    }

    function showError(message) {
        statusBox.className = "status error";
        statusBox.textContent = message;
    }
</script>
</body>
</html>
