spring.config.import=optional:classpath:.env[.properties]
spring.application.name=bank-payment-plugin

server.port=${BANK_PLUGIN_SERVER_PORT}

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false

# Errors
server.error.include-message=always

# Console colors
spring.output.ansi.enabled=ALWAYS

# General logging
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=ERROR
logging.level.com.sep.bank.plugin.back=ERROR
logging.level.com.sep.bank.plugin.back.shared.logging.service.impl.AppLoggerServiceImpl=INFO

# Console log format
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} | %clr(%-5level) | %clr(%-15X{feature:-UNSPECIFIED}){cyan} | %clr(%-30X{action:-UNSPECIFIED}){magenta} | %msg%n

# File logging
logging.file.name=logs/bank-payment-plugin.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} | %-5level | %-15X{feature:-APP} | %-30X{action:-UNSPECIFIED} | %msg%n

# Database configuration
spring.datasource.url=jdbc:postgresql://${BANK_PLUGIN_DB_HOST}:${BANK_PLUGIN_DB_PORT}/${BANK_PLUGIN_DB_NAME}
spring.datasource.username=${BANK_PLUGIN_DB_USERNAME}
spring.datasource.password=${BANK_PLUGIN_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database=postgresql
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Plugin
app.plugin.base-url=${BANK_PLUGIN_BASE_URL}
app.plugin.manifest-path=${BANK_PLUGIN_MANIFEST_PATH}
app.plugin.bank-callback-url=${BANK_PLUGIN_BANK_CALLBACK_URL}

# PSP
app.psp.base-url=${PSP_BASE_URL}
app.psp.sync_path=${PSP_SYNC_PATH}
app.psp.sync.max-attempts=5
app.psp.sync.retry-delay-ms=3000
app.psp.payment-callback-path=${PSP_CALLBACK_PATH}
app.psp.callback.max-attempts=3
app.psp.callback.retry-delay-ms=1000

# Bank
app.bank.base-url=${BANK_BASE_URL}

# Signature security
app.security.psp-secret=${BANK_PLUGIN_PSP_SECRET}
app.security.bank-secret=${BANK_PLUGIN_BANK_SECRET}
app.security.plugin-code=BANK_PLUGIN
app.security.signature-max-timestamp-age-minutes=5




