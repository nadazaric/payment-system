#If there is no .env file in the resources directory, comment out the line below
spring.config.import=optional:classpath:.env[.properties]
spring.application.name=back
server.port=${SERVER_PORT}

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.enable-hateoas=false
springdoc.enable-data-rest=false

#Errors
server.error.include-message=always

#JWT
jwt.secret=${JWT_SECRET_KEY}

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.database=postgresql
#Update
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.defer-datasource-initialization=false
#spring.sql.init.mode=never
#Drop and fill
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Generator
app.merchant-id.prefix=${MERCHANT_ID_PREFIX}
app.merchant-id.alphabet=${MERCHANT_ID_ALPHABET}
app.merchant-id.length=${MERCHANT_ID_LENGTH}
app.merchant-password.prefix=${MERCHANT_PASSWORD_PREFIX}
app.merchant-password.alphabet=${MERCHANT_PASSWORD_ALPHABET}
app.merchant-password.length=${MERCHANT_PASSWORD_LENGTH}